[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "revise-agent"
version = "0.1.0"
description = "Minimal POC for reviewing LaTeX drafts with Codex and Claude"
readme = "README.md"
requires-python = ">=3.9"
authors = [
  { name = "Zichao Yang" }
]
dependencies = [
  "sympy>=1.13,<2",
]

[project.scripts]
revise-agent = "revise_agent.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
